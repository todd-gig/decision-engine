steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/decision-engine:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/decision-engine:latest'
      - '.'

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/decision-engine:$BUILD_ID']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/decision-engine:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - decision-engine
      - '--image=gcr.io/$PROJECT_ID/decision-engine:$BUILD_ID'
      - '--region=us-central1'
      - '--platform=managed'
      - '--port=8000'
      - '--min-instances=1'
      - '--max-instances=5'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--cpu-boost'
      - '--timeout=300'
      - '--startup-probe=tcpSocket.port=8000,initialDelaySeconds=0,periodSeconds=10,timeoutSeconds=5,failureThreshold=30'
      - '--no-allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/decision-engine:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/decision-engine:latest'

options:
  logging: CLOUD_LOGGING_ONLY
