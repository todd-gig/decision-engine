# REPORT CONFIGURATION
# ============================================================================

report:
  output_dir: drift_sentinel/reports
  formats: [json, markdown]
  group_by: [severity, source, rule_id]
  fail_threshold: critical  # exit 1 if any critical drift found
  summary_top_n: 25
