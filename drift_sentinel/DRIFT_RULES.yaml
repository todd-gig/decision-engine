# Gigaton Drift Sentinel — Machine-Readable Rule Set
# Each rule maps to a principle/framework in GIGATON_CANONICAL_FIRST_PRINCIPLES.md
# Loaded by drift_scan.py and applied recursively to every artifact.
#
# Schema:
#   id: stable identifier (CRIT-* / MAJ-* / MIN-* / INFO-*)
#   principle_ref: §X of canonical doc
#   severity: critical | major | minor | info
#   scope: which artifact types this applies to
#     - codebase: any repo with package.json/pyproject.toml/Dockerfile
#     - markdown: .md docs (memory, plans, briefs)
#     - decision: Decision Records / PRs / proposals
#     - clickup_task: ClickUp items
#     - drive_doc: Google Drive files
#   detection: how the scanner identifies a violation (regex/structural/missing-field)
#   remediation: short fix instructions

version: 1.2.0
generated: 2026-05-14
canonical_ref: GIGATON_CANONICAL_FIRST_PRINCIPLES.md

# ============================================================================
# CRITICAL — NON-NEGOTIABLE VIOLATIONS (block deploy / require remediation)
# ============================================================================

rules:

  - id: CRIT-001
    name: automation_without_human_override
    principle_ref: §1.1, §4
    severity: critical
    scope: [codebase, decision, markdown]
    detection:
      type: structural
      check: |
        For any code/plan that auto-executes (D1-D2 with R3/R4) or any LLM
        agent loop, verify presence of:
          - rollback_trigger field/function
          - human-in-the-loop escape (override flag, manual approval branch)
          - max_attempts + dead_letter on jobs
      patterns:
        - "while True"
        - "auto_execute"
        - "agent.run"
        - "claude_agent_options"
      negative_signal: missing rollback/override
    remediation: Add rollback path, override flag, and dead-letter queue. Reference §5.4 D5/D6.

  - id: CRIT-002
    name: ethical_misalignment_above_threshold
    principle_ref: §1.2, §2.14
    severity: critical
    scope: [decision, markdown, clickup_task]
    detection:
      type: field_value
      check: ethical_misalignment > 3 OR ethical_conflict == true
    remediation: Decision must BLOCK and escalate to Tier 3. No override.

  - id: CRIT-003
    name: prompt_without_versioning
    principle_ref: §6
    severity: critical
    scope: [codebase]
    detection:
      type: regex_in_python_or_ts
      patterns:
        - 'anthropic\.messages\.create'
        - 'client\.messages\.create'
        - 'openai\.chat\.completions'
      negative_signal: no nearby `prompt_version` / `schema_version` attached to the call or audit record
    remediation: Attach prompt_version + schema_version to every prod LLM call. Persist with audit record.

  - id: CRIT-004
    name: undefined_ownership
    principle_ref: §4
    severity: critical
    scope: [decision, clickup_task]
    detection:
      type: missing_field
      required_fields: [owner]
      check: |
        Applies ONLY to artifacts that are explicit decision records. The
        artifact must contain at least one of these markers:
          - YAML frontmatter `type: decision_record`
          - Filename matching `decision_*.md` / `DR-*.md` / `RFC-*.md`
          - First H1 includes "Decision Record" / "RFC" / "Decision:"
          - Frontmatter `decision_id:` / `dr_id:` field present
        Once classified as a decision record, the artifact MUST have a
        non-empty `owner:` field. Casual mentions of the word "decision"
        in body text DO NOT trigger this rule (prior version produced
        false positives on CLAUDE.md / README.md).
    remediation: Assign owner before QC certificate can be issued.

  - id: CRIT-005
    name: decisions_without_auditability
    principle_ref: §4, §1.6
    severity: critical
    scope: [decision, markdown]
    detection:
      type: missing_field
      required_fields: [evidence_refs]
      check: evidence_refs is empty array
    remediation: Cite evidence sources. Empty evidence_refs → TC certificate DENIED.

  - id: CRIT-006
    name: action_without_qualification
    principle_ref: §4, §5.4
    severity: critical
    scope: [decision]
    detection:
      type: structural
      check: |
        decision_class in [D3, D4, D5, D6] AND required_approvals is empty
    remediation: List approvers per Authority Matrix (§5.4). D5/D6 require Human_CEO.

  - id: CRIT-007
    name: provider_lock_in
    principle_ref: §7, §4
    severity: critical
    scope: [codebase]
    detection:
      type: structural
      check: |
        AI/LLM call sites missing both `provider` and `model` fields, OR
        hardcoded provider with no abstraction interface
      patterns:
        - 'AI(?:Provider|Adapter|Client)'
    remediation: Implement AIProvider interface. Pass provider + model at runtime.

  - id: CRIT-008
    name: fake_market_data
    principle_ref: §7 (no fake external data), Pricing pattern
    severity: critical
    scope: [codebase, markdown]
    detection:
      type: structural
      check: |
        Pricing/scoring output schemas missing `assumptions[]` field, or
        seeded values not labeled as synthetic
      patterns:
        - 'recommended_(base|peak|weekend)_rate'
        - 'pricing_engine'
    remediation: Always populate assumptions[]. Swap for actuals when data arrives. Never silently seed.

  - id: CRIT-009
    name: irreversible_without_mandatory_human
    principle_ref: §1.1, §2.11, §5.4
    severity: critical
    scope: [decision, codebase]
    detection:
      type: structural
      check: |
        decision_class in [D5, D6] AND verdict == auto_execute
        OR reversibility in [R3, R4] AND no human approval gate
    remediation: Mandatory human approval. Override = doctrine violation.

  - id: CRIT-010
    name: state_vector_substitution
    principle_ref: §5.19 (Business Field Theory canonical state vector)
    severity: critical
    scope: [codebase, markdown]
    detection:
      type: structural
      check: |
        Any spec/code asserting a "state vector" that differs from the
        canonical 9 variables [trust, attention, clarity, desire, urgency,
        value, friction, social_proof, context_fit]. Variable substitution,
        addition, or removal requires a new amendment under triad sign-off.
        This rule fires when:
          - A Python module defines STATE_VARIABLES / STATE_VECTOR_KEYS /
            STATE_VECTOR_VARS / similar with a list that is not exactly the
            canonical 9 (set-equality match, order-insensitive)
          - A Pydantic / dataclass / TypedDict declaring fields named after
            >=3 of the canonical 9 ALSO contains a non-canonical state-vector
            field (e.g. "engagement", "intent", "loyalty" treated as state)
          - A markdown spec or amendment YAML asserts a state vector whose
            variable set is not exactly the canonical 9
      patterns:
        - 'STATE_(VARIABLES|VECTOR_KEYS|VECTOR_VARS)\s*='
        - 'class\s+StateVector'
        - 'state_vector\s*:\s*(dict|Mapping|list)'
      negative_signal: |
        For each match, extract the variable set; if it differs from the
        canonical 9 (and is not inside a docstring quoting the doctrine
        for explanation), fire. Substitutions in test fixtures with the
        prefix `pre_mtheory_` or under `tests/historical/` are exempt.
    remediation: |
      Use the canonical 9 variables exactly. If a new state variable is
      genuinely needed, draft an amendment per
      governance_signoff_bootstrap_protocol and merge under triad
      sign-off BEFORE introducing it in code. See §5.19.

  - id: CRIT-011
    name: env_mutation_in_request_handler
    principle_ref: §6 (audit envelope), §7 (concurrency safety)
    severity: critical
    scope: [codebase]
    # Test fixture that intentionally demonstrates the anti-pattern in
    # string literals to verify the scanner catches it. Excluding the
    # fixture file itself is doctrine-aligned — the scanner should not
    # flag its own self-test inputs. Per-rule exclusion (not a blanket
    # tests/ blacklist) preserves coverage of every other rule against
    # tests/. WHY: false-positive cluster on 2026-05-14 scan (21/29 CRIT).
    path_exclude:
      - "tests/test_drift_preventive_rules.py"
    detection:
      type: structural
      check: |
        Mutating `os.environ` (or `environ.__setitem__`) inside a function
        whose decorators include a FastAPI route registration is a
        cross-user credential contamination vector. FastAPI handlers run
        concurrently across an asyncio event loop AND across uvicorn
        workers; `os.environ` is process-global. Writing one user's
        secret reference into `os.environ` and then having a second
        request read it produces silent credential swap.

        Documented bug class: SIE PR `fix/llm-secret-ref-param`
        (2026-05-14) removed `os.environ[KEY] = secret_ref` from
        `_intel_call_one_provider`; see memory file
        `design_decision_secret_ref_parameter_2026_05_14.md`.

        Fires on:
          - `os.environ[KEY] = ...` inside a function whose decorators
            include `@app.<verb>` / `@router.<verb>` / FastAPI APIRouter
            method decorators (get/post/put/patch/delete/options/head)
          - `os.environ.__setitem__(...)` in the same contexts
          - `os.environ.update({...})` in the same contexts
          - `os.environ.pop(...)` is allowed (read-side; not contamination)
            and does NOT fire

        v0 detection is direct-decorator only (does not trace transitive
        callers); the bug-class lives in route handlers. Helper functions
        called by handlers are out of v0 scope but should be re-evaluated
        if the rule does not catch a future variant.
      patterns:
        - 'os\.environ\['
        - 'os\.environ\.(update|__setitem__)'
      negative_signal: |
        For each match, walk back to the enclosing `def`/`async def` and
        inspect the decorator stack within ±10 lines above the def line.
        Fire only if any decorator matches FastAPI route patterns
        (`@app.get`, `@app.post`, `@router.get`, `@router.post`, etc.).
        Read-only `os.environ.get(KEY)` / `KEY in os.environ` does NOT
        fire — only mutation.
    remediation: |
      Pass the value as an explicit parameter; do not mutate process-global
      state in concurrent handlers. See memory
      `design_decision_secret_ref_parameter_2026_05_14.md`. The SIE
      pattern: replaced `os.environ[X] = ref` with passing
      `secret_ref=ref` as an explicit kwarg through the provider call
      chain. Each request carries its own credential reference; no
      shared mutable state.

# ============================================================================
# MAJOR — DRIFTS FROM CORE PRINCIPLE OR FRAMEWORK (review required)
# ============================================================================

  - id: MAJ-001
    name: partial_capability_shipment
    principle_ref: §5.14
    severity: major
    scope: [codebase]
    detection:
      type: structural
      check: |
        Capability claimed shipped (status: ✅) but missing one of:
          - schema (Prisma model / SQL DDL / Pydantic class)
          - API (route handler / endpoint)
          - UI (page / component)
      reference_file: CAPABILITY_AUDIT.md (if present)
    remediation: "Mark scaffolded until all 3 layers present. Phase gate §5.14."

  - id: MAJ-002
    name: complexity_without_leverage
    principle_ref: §3.6, §4
    severity: major
    scope: [decision, markdown]
    detection:
      type: field_value
      check: execution_drag > 3 AND compounding_potential < 2
    remediation: Reduce coordination burden OR demonstrate flywheel. Otherwise reject design.

  - id: MAJ-003
    name: short_term_extraction_harms_trust
    principle_ref: §3.5, §4
    severity: major
    scope: [decision, markdown]
    detection:
      type: structural
      check: |
        Strategic alignment LOW (≤2) AND revenue_impact HIGH (≥4)
        AND customer_human_benefit LOW (≤2)
    remediation: Re-score against Ethos #5 (sovereignty/fair compensation). Revise plan.

  - id: MAJ-004
    name: unaudited_state_change
    principle_ref: §6, Carmen Beach event-sourcing pattern
    severity: major
    scope: [codebase]
    detection:
      type: structural
      check: |
        DB writes outside Job/WorkflowEvent envelope, OR
        no idempotency_key on retryable operations
      patterns:
        - 'prisma\.[a-z]+\.update'
        - 'prisma\.[a-z]+\.delete'
        - 'cursor\.execute.*UPDATE'
    remediation: Wrap in Job + WorkflowEvent. Add idempotency_key.

  - id: MAJ-005
    name: monorepo_circular_dependency
    principle_ref: §7
    severity: major
    scope: [codebase]
    detection:
      type: structural
      check: |
        Package in /packages/* imports from /apps/*
        OR /apps/web imports from /apps/admin (or vice versa)
    remediation: Move shared code to packages/. Apps depend on packages, never reverse.

  - id: MAJ-006
    name: schema_first_violation
    principle_ref: §5.14, §7
    severity: major
    scope: [codebase]
    detection:
      type: structural
      check: |
        UI page exists for entity X, but no schema.prisma / pydantic model defines entity X
    remediation: Define schema first. Generate types. Then build UI.

  - id: MAJ-007
    name: rtql_bypass
    principle_ref: §5.1
    severity: major
    scope: [codebase, decision]
    detection:
      type: structural
      check: |
        Inputs feeding decision engine without rtql_stage/rtql_multiplier annotation
    remediation: Run RTQL prefilter. Default to qualified (1.0) only if explicitly justified.

  - id: MAJ-008
    name: codification_overdue
    principle_ref: §8 (codification trigger)
    severity: major
    scope: [codebase, markdown]
    detection:
      type: telemetry
      check: |
        Same Claude decision type executed >50 times with <5% exception rate
        AND no Python migration shipped
    remediation: Migrate to Python. Claude focuses on next ambiguous frontier (§5.8 flywheel).

  - id: MAJ-009
    name: missing_phase_gate
    principle_ref: §5.14
    severity: major
    scope: [codebase, markdown]
    detection:
      type: structural
      check: |
        Phase 2 work (AI enrichment, pricing, lead scoring) shipped while
        Phase 1 has incomplete capabilities (per CAPABILITY_AUDIT.md)
    remediation: Complete Phase 1 first. No placeholders. Reject shallow scaffolding.

  - id: MAJ-010
    name: gigent_value_chain_break
    principle_ref: §5.15
    severity: major
    scope: [decision, markdown]
    detection:
      type: structural
      check: |
        PR/release description names functionality but does NOT name
        the human super-ability surfaced
    remediation: Name the super-ability. If you can't, design isn't gigent quality. (§5.15)

  - id: MAJ-011
    name: dvm_single_axis_optimization
    principle_ref: §5.10
    severity: major
    scope: [decision, markdown]
    detection:
      type: structural
      check: |
        Initiative scores high on People OR Process OR Tech OR Learning,
        but ignores or degrades the other three
    remediation: DVM is multiplicative. Score across all 4 systems before approving.

  - id: MAJ-012
    name: in_memory_state_without_db_writethrough
    principle_ref: §6, Carmen Beach event-sourcing pattern
    severity: major
    scope: [codebase]
    detection:
      type: structural
      check: |
        Module-level `_<name>: dict[str, dict] = {}` (or list[dict]) where
        the same file ALSO contains `INSERT INTO <name>` SQL, but at least
        one mutation site for the dict has no INSERT to that table within
        a ±30-line window. This is the SIE chat-queue bug class
        (#198, 2026-05-12): the canonical write path is DB-first but a
        parallel handler appends only in memory, causing items to vanish
        on Cloud Run scale-out or revision roll.
      patterns:
        - '^_[a-z][\w]*\s*:\s*dict\[str,\s*dict\]\s*=\s*\{\}'
        - '^_[a-z][\w]*\s*:\s*list\[dict\]\s*=\s*\[\]'
      negative_signal: |
        For each module-level dict/list declaration above, if the file
        also contains `INSERT INTO <basename>` AND any mutation site for
        the dict has no `INSERT INTO <basename>` in the same function
        body (and is not in a `_db_available` fallback branch), fire on
        that mutation site. Comments are stripped before matching.
    remediation: |
      DB is the source of truth. Every mutation site for a module-level
      cache that mirrors a DB table must pair the in-memory write with
      an INSERT (or UPDATE) inside the same function. See operator-api
      enqueue_decision (canonical pattern) and _intel_enqueue_proposed_
      actions (post-#198 fix) for two examples.

  - id: MAJ-013
    name: cloudbuild_secret_env_in_non_bash_step
    principle_ref: §6, standard_engine_deploy_template.md §5
    severity: major
    scope: [codebase]
    detection:
      type: structural
      check: |
        A cloudbuild.yaml step uses `secretEnv: [...]` but the step's
        `name:` is NOT a bash-entrypoint image (e.g. `exec-wrapper`,
        `gcr.io/cloud-builders/docker`, raw gcloud images). Cloud Build
        only substitutes $$SECRET_NAME in steps that run a shell;
        non-shell steps receive the literal string '$SECRET_NAME' as
        the env value, silently breaking auth.
      patterns:
        - 'secretEnv:\s*\['
      negative_signal: |
        For each step containing `secretEnv:`, check whether the step
        also has `entrypoint: bash` OR uses `entrypoint: ["bash", "-c"]`.
        If neither and the step name is `gcr.io/google-appengine/exec-wrapper`
        or similar non-shell wrapper, fire.
    remediation: |
      Use `entrypoint: bash` with the secret reference in a shell expansion:
        - name: gcr.io/cloud-builders/gcloud
          entrypoint: bash
          args:
            - -c
            - 'gcloud whatever --password="$$DB_PASSWORD"'
          secretEnv: [DB_PASSWORD]
      OR move the secret consumption to container startup (12-factor
      pattern per standard_engine_deploy_template.md §2). PPEME/HME hit
      this 2026-05-13 — fixed via startup migration in start.sh.

  - id: MAJ-014
    name: cloudsql_password_drift_between_instance_and_secret
    principle_ref: §6, standard_engine_deploy_template.md §9
    severity: major
    scope: [codebase]
    detection:
      type: structural
      check: |
        A repo's cloudbuild.yaml or SETUP.md/README references both a
        Cloud SQL instance (`gcloud sql instances create <name>`) and a
        Secret Manager secret (`gcloud secrets create <db-password>`) for
        the same DB, but the password value used in each command is
        generated by SEPARATE `openssl rand` calls. Drift between the
        instance's postgres-user password and the secret value causes
        FATAL "password authentication failed" at runtime.
      patterns:
        - '--root-password="\$\(openssl rand'
        - 'openssl rand -base64'
      negative_signal: |
        Two or more `openssl rand` invocations in adjacent commands
        where one targets `gcloud sql instances create` and another
        targets `gcloud secrets create <name>-db-password`. Fire if the
        same shell variable is NOT reused across both commands.
    remediation: |
      Generate the password ONCE and reuse:
        PW="$(openssl rand -base64 24)"
        gcloud sql instances create <name>-pg --root-password="$PW" ...
        echo -n "$PW" | gcloud secrets create <name>-db-password --data-file=- ...
      PPEME hit this 2026-05-14. See standard_engine_deploy_template.md §9.

  - id: MAJ-015
    name: cloudrun_runtime_sa_missing_cloudsql_client
    principle_ref: §6, standard_engine_deploy_template.md §10
    severity: major
    scope: [codebase, markdown]
    detection:
      type: structural
      check: |
        Engine deploy script / SETUP.md / cloudbuild.yaml creates a
        runtime service account (`gcloud iam service-accounts create
        <engine>-runtime`) but does NOT grant `roles/cloudsql.client`
        at the project level for that SA, while the same engine ALSO
        uses `--add-cloudsql-instances=` in its deploy step. Cloud SQL
        Auth Proxy will fail with 403 "Not authorized to access
        resource. Possibly missing permission cloudsql.instances.get".
      patterns:
        - 'iam service-accounts create [a-z][-a-z0-9]*-runtime'
        - '--add-cloudsql-instances'
      negative_signal: |
        For each `iam service-accounts create <name>-runtime` in the
        repo's setup scripts/docs, search for matching
        `add-iam-policy-binding ... --role="roles/cloudsql.client"`
        targeting that SA. If absent AND the engine uses
        --add-cloudsql-instances anywhere in cloudbuild.yaml, fire.
    remediation: |
      Add immediately after SA creation:
        gcloud projects add-iam-policy-binding $PROJECT_ID \
          --member="serviceAccount:<engine>-runtime@$PROJECT_ID.iam.gserviceaccount.com" \
          --role="roles/cloudsql.client"
      PPEME hit this 2026-05-14. See standard_engine_deploy_template.md §10.

  - id: MAJ-016
    name: decision_without_state_estimate
    principle_ref: §5.19 (BFT — forward simulation requires state)
    severity: major
    scope: [codebase, decision]
    detection:
      type: structural
      check: |
        Any Decision Certificate with decision_class in [D2, D3, D4, D5, D6]
        produced without `state_vector_at_decision` field (or with an empty
        / 0-length state vector). Decision class D1 is exempt (auto-execute
        trivial-reversible, no forward simulation required).
        Fires on:
          - decision-engine certificate payloads in `certificates/` / API
            responses missing the field
          - Test fixtures asserting D2-D6 certificates without state_vector
          - Code paths that emit decision records via `_emit_certificate(...)`
            with no upstream call to a registered state_estimator
      patterns:
        - 'decision_class\s*[:=]\s*["'']?D[2-6]'
        - 'EC-[A-Z0-9-]+'
      negative_signal: |
        Match the surrounding artifact / function — if no
        `state_vector_at_decision` or `state_estimate` field is present
        within 30 lines (code) or in the certificate JSON schema, fire.
    remediation: |
      Attach state vector estimate from a registered state_estimator
      (PPEME `/v1/state/estimate-from-events` or equivalent) before
      issuing the certificate. Persist with the EC. §5.19 + ppeme/api/
      state_estimator.py.

  - id: MAJ-017
    name: forecast_without_confidence_bands
    principle_ref: §5.19 (BFT — forecasts must carry distribution)
    severity: major
    scope: [codebase, decision, markdown]
    detection:
      type: structural
      check: |
        Any artifact citing a forecast / prediction / projection value
        that lacks accompanying `{p10, p50, p90}` distribution (or a
        named equivalent: `confidence_band`, `forecast_distribution`,
        `prediction_interval`). Single-point forecasts are doctrine drift
        per §5.19 falsifiability requirement.
      patterns:
        - 'forecast\s*[:=]'
        - 'predicted_(revenue|conversion|ltv|outcome)'
        - 'projection\s*[:=]'
      negative_signal: |
        For each match, search within ±20 lines for `p10`, `p50`, `p90`,
        `confidence_band`, `distribution`, `prediction_interval`,
        `monte_carlo`. If none present, fire. Forecast values inside
        test fixtures named `test_*_fixture.py` are exempt only if the
        test asserts the absence (negative test).
    remediation: |
      Compute forecasts with Monte Carlo or equivalent stochastic
      simulation; surface p10/p50/p90 bands alongside the central
      estimate. PPEME `engine/simulation.py` returns the canonical
      shape. §5.19 falsifiability threshold + Master Calculator.

  - id: MAJ-018
    name: uncalibrated_forecast_as_authority
    principle_ref: §5.19 (BFT — pre-Mtheory non-authoritative)
    severity: major
    scope: [codebase, decision, markdown]
    detection:
      type: structural
      check: |
        A forecast from a decision class with calibration status
        `pre_mtheory` (variance > p50 15% over a 30-day window, OR no
        30-day calibration window available yet) cited as an authoritative
        input to a downstream decision. Fires when:
          - A decision certificate references `forecast_id` whose source
            decision class has `calibration_status: pre_mtheory` in
            PPEME's calibration table
          - A spec/memo recommends action on the basis of a forecast
            without disclosing its calibration status
          - Pre-mtheory forecasts not labeled in surfaced UI (recommendation
            panels, dashboards, weekly reports)
      patterns:
        - 'forecast_id\s*[:=]'
        - 'predicted_(revenue|conversion|ltv)\s*[:=]'
      negative_signal: |
        Cross-reference forecast_id with PPEME calibration table. If
        `calibration_status == pre_mtheory` AND the artifact does not
        carry an explicit `pre_mtheory: true` / `non_authoritative: true`
        / `uncalibrated_warning` marker, fire.
    remediation: |
      Either (a) label the forecast `pre_mtheory: true` and demote it
      from authoritative input, or (b) wait for the decision class to
      reach calibration threshold (p50 ≤ 15% over 30 days). §5.19
      production-grade definition.

  - id: MAJ-019
    name: engine_module_missing_penrose_signal
    principle_ref: penrose_falsification_doctrine.md §How to Operationalize as GOALS
    severity: major
    scope: [codebase]
    detection:
      type: structural
      check: |
        Per penrose_falsification_doctrine.md: "After Codification +
        Override engines ship, propose Drift Sentinel rule: any engine
        ships without a Penrose signal declaration → MAJOR drift." Both
        engines have shipped (Codification v0.5 + Human Override v0.5).
        This rule now activates the doctrine commitment.

        For each NEW python module under `engine/<sub-package>/*.py`
        (excluding `__init__.py` empty stubs and `tests/`), the module
        docstring OR a top-of-file comment block MUST declare both:
          - `penrose_signal:` followed by one of:
              weakens | strengthens | neutral
          - `penrose_dimension:` followed by one or more of:
              codification | override_rate | velocity | variance |
              cascade | network_value | revenue_per_touch | drift_count
        Modules under `engine/` that predate this rule (pre-2026-05-14)
        are grandfathered until next material edit (>10 line diff).
      patterns:
        - '^engine/[a-z_][\w]*/[a-z_][\w]*\.py$'
      negative_signal: |
        Read the first 60 lines of the module. If neither
        `penrose_signal:` nor `penrose_dimension:` appears in a docstring
        or comment, fire. Modules whose first 5 lines contain
        `# legacy:` or `# grandfathered:` are exempt.
    remediation: |
      Add to the module docstring (after WHAT/WHY/WHERE/WHEN/HOW):

          penrose_signal: weakens
          penrose_dimension: codification | override_rate | velocity |
                             variance | cascade | network_value |
                             revenue_per_touch | drift_count

      Per memory penrose_falsification_doctrine.md §How to Operationalize.
      Every engine ships either Penrose-weakening evidence, Penrose-
      strengthening evidence, or neutral instrumentation — never undeclared.

  - id: MAJ-020
    name: dockerfile_alembic_discipline
    principle_ref: §6, standard_engine_deploy_template.md §1-§2
    severity: major
    scope: [codebase]
    detection:
      type: structural
      check: |
        An engine repo that has `alembic.ini` and/or an `alembic/`
        directory at its root MUST COPY both into its Docker image AND
        have a `start.sh` that runs `alembic upgrade head` before
        launching the app. Otherwise the container boots without applying
        migrations and Cloud Run keeps serving the prior (or unmigrated)
        schema. This is HME bug #4 from the 2026-05-13 cascade — the
        Dockerfile only copied `api/`, so `alembic upgrade head` logged
        `No config file alembic.ini found` at every cold start.

        Fires on:
          - Dockerfile in a repo where `<repo>/alembic.ini` exists but
            the file contains no `COPY ... alembic.ini` directive
          - Dockerfile in a repo where `<repo>/alembic/` exists but the
            file contains no `COPY ... alembic` directive
          - Repo has `start.sh` but the script lacks
            `alembic upgrade head` (12-factor startup migration)
      patterns:
        - 'COPY\s+.*alembic'
        - 'alembic upgrade head'
      negative_signal: |
        For each Dockerfile, look up sibling `alembic.ini` /
        `alembic/`. If either exists and is not COPY'd into the image,
        fire. Separately, if `start.sh` exists and does not run
        `alembic upgrade head`, also fire.
    remediation: |
      Per standard_engine_deploy_template.md §1-§2:
        COPY --chown=app:app alembic/      /app/alembic/
        COPY --chown=app:app alembic.ini   /app/alembic.ini
        COPY --chown=app:app start.sh      /app/start.sh
        RUN chmod +x /app/start.sh
        CMD ["/app/start.sh"]
      AND in start.sh:
        if [[ -n "${DB_HOST:-}" || -n "${DATABASE_URL:-}" ]]; then
          alembic upgrade head
        fi
        exec uvicorn api.main:app --host 0.0.0.0 --port "${PORT:-8080}"

  - id: MAJ-021
    name: cloud_sql_url_discipline
    principle_ref: §6, §7, standard_engine_deploy_template.md §3
    severity: major
    scope: [codebase]
    detection:
      type: structural
      check: |
        Database URL construction targeting a Cloud SQL Auth Proxy
        unix-socket host (`/cloudsql/<project>:<region>:<instance>`)
        MUST use `sqlalchemy.engine.URL.create(...,
        query={"host": socket_path})`. Raw f-strings and `+`
        concatenation produce URLs whose colons in the socket path
        corrupt psycopg2's parser, which silently falls back to the
        default socket `/var/run/postgresql/.s.PGSQL.5432` → connection
        fails. HME bug #6 from the 2026-05-13 cascade.
      patterns:
        - 'f["''](?:postgresql|postgres)\+?\w*://[^"'']*@/cloudsql/[^"'']+["'']'
        - '["''](?:postgresql|postgres)\+?\w*://[^"'']*\{(?:host|socket)[^"'']*\}'
      negative_signal: |
        For each match, scan ±15 lines for `URL.create(`. If present,
        the file uses the safe pattern; skip. Lines with
        `# noqa: MAJ-021` are also skipped.
    remediation: |
      Per standard_engine_deploy_template.md §3:
        from sqlalchemy.engine import URL
        if host.startswith("/"):  # Cloud SQL Auth Proxy socket
            url = URL.create(
                drivername="postgresql+psycopg2",
                username=user, password=password, database=name,
                query={"host": host},
            ).render_as_string(hide_password=False)
      Never f-string a socket-path host. Same pattern in alembic/env.py.

# ============================================================================
# MINOR — STYLISTIC / TACTICAL DEVIATION (log and track)
# ============================================================================

  - id: MIN-001
    name: typescript_any_usage
    principle_ref: §2.9, §7
    severity: minor
    scope: [codebase]
    detection:
      type: regex
      patterns:
        - ': any\b'
        - '<any>'
        - 'as any'
    remediation: Tighten types. `_` prefix allowed for intentionally unused.

  - id: MIN-002
    name: no_test_suite
    principle_ref: §7
    severity: minor
    scope: [codebase]
    detection:
      type: structural
      check: |
        package.json has "test" script but no actual test files
        OR pyproject.toml without pytest config
    remediation: Add at least smoke tests for golden path.

  - id: MIN-003
    name: bilingual_missing
    principle_ref: §5.14, Carmen Beach pattern (EN+ES)
    severity: minor
    scope: [codebase]
    detection:
      type: structural
      check: |
        Customer-facing strings in code but no i18n / EN+ES translations object
    remediation: Add translations. Latin America markets default EN+ES.

  - id: MIN-004
    name: missing_health_endpoint
    principle_ref: §7 (Cloud Run readiness)
    severity: minor
    scope: [codebase]
    detection:
      type: structural
      check: |
        FastAPI/Express app deployed to Cloud Run without /health or /readiness
    remediation: Add /health (liveness) and /readiness (deps OK).

  - id: MIN-005
    name: comment_overuse
    principle_ref: "Tone preferences (Todd style — minimal comments)"
    severity: minor
    scope: [codebase]
    detection:
      type: ratio
      check: |
        Comment lines / code lines > 0.4 in non-doctrine files
    remediation: Remove comments that explain WHAT (code shows that). Keep WHY-comments only.

  - id: MIN-006
    name: clickup_task_no_outcome
    principle_ref: §1.5, §6
    severity: minor
    scope: [clickup_task]
    detection:
      type: structural
      check: |
        Task has description but no monitoring_metric / success criteria
    remediation: Add measurable outcome. "Done when X is true."

  - id: MIN-007
    name: interaction_without_effect_vector
    principle_ref: §5.19 (BFT — interaction catalog completeness)
    severity: minor
    severity_escalation:
      escalates_to: major
      after_days: 30
      reason: |
        Interactions uncatalogued for >30 days indicate systemic
        catalog drift; PPEME state-estimator + Master Calculator lose
        forward-simulation accuracy proportional to uncatalogued surface.
    scope: [codebase]
    detection:
      type: structural
      check: |
        A production user-facing interaction surface (route handler,
        page component, gamification event emitter, sales-OS opportunity
        action) without a matching entry in PPEME's interaction catalog
        carrying a non-null `delta_i` (effect vector) field.
        Fires on:
          - gigaton-ui-system page components rendering an `<a>`,
            `<button>`, or form submission not registered in
            interaction_catalog by `interaction_id`
          - HME event emitters firing events whose `event_type` has no
            interaction_catalog mapping
          - Decision-engine handlers wrapping `pipeline.process(...)`
            with an upstream surface not catalog-registered
      patterns:
        - 'interaction_id\s*[:=]'
        - 'emit_event\s*\('
        - 'pipeline\.process\s*\('
      negative_signal: |
        Cross-reference with PPEME interaction_catalog table. If no
        matching row OR `delta_i` is null, fire MINOR. If interaction
        first observed > 30 days ago (per first_seen_at in catalog
        ingestion log), escalate to MAJOR.
    remediation: |
      Register the interaction in PPEME's interaction_catalog with a
      measured or estimated `delta_i` effect vector. §5.19 Interaction
      Model. Confidence may start low; calibration accrues over time.

  - id: MIN-008
    name: interaction_without_cost
    principle_ref: §5.19 (BFT — interaction ranking requires cost)
    severity: minor
    scope: [codebase]
    detection:
      type: structural
      check: |
        An interaction_catalog entry exists but has no `estimated_cost`
        field (or `estimated_cost == null`). Recommendation panels rank
        interactions by `delta_i / estimated_cost`; missing cost
        eliminates the entry from ranked output.
      patterns:
        - 'interaction_catalog\.'
        - 'INSERT INTO interaction_catalog'
      negative_signal: |
        For each catalog entry, if `estimated_cost` is null and the
        entry is referenced by a recommendation/ranking surface, fire.
    remediation: |
      Populate estimated_cost (currency, time, or normalized units —
      pick one and stay consistent within a vertical). May be a rough
      estimate; calibration improves over time. §5.19 Interaction Model.

  - id: MIN-009
    name: cloud_run_max_instances_above_one
    principle_ref: §7 (Cloud Run readiness), v0 single-instance design assumptions
    severity: minor
    scope: [codebase]
    detection:
      type: structural
      check: |
        A Cloud Run service deploy/config sets `--max-instances` (CLI flag)
        or `max_instances`/`maxScale` (YAML/annotation) to an integer > 1.
        Several v0 designs assume single-instance correctness:
          - SecretStore cache invalidation (PR #208 — process-local cache;
            cross-instance staleness on rotation; see memory
            `design_decision_secret_store_cache_2026_05_14.md`)
          - In-memory rate-limiter state (per-process counters)
          - Scheduler / cron leader-election (no distributed lock)
        Lifting `--max-instances` above 1 BEFORE v1 cross-instance work
        ships introduces silent correctness bugs (stale credentials,
        rate-limit bypass, duplicate scheduled jobs).

        Fires on:
          - `cloudbuild.yaml` deploy steps with
            `--max-instances=N` / `--max-instances N` where N > 1
          - `service.yaml` / Cloud Run YAML with
            `autoscaling.knative.dev/maxScale: "N"` annotation where N > 1
          - `max_instances: N` / `maxScale: N` field where N > 1
      patterns:
        - '--max-instances[= ]\s*(\d+)'
        - 'maxScale["\s:]+["'']?(\d+)'
        - 'max_instances\s*[:=]\s*(\d+)'
      negative_signal: |
        Parse the captured integer. Fire when N > 1. Do NOT fire when
        N <= 1 or when the flag/field is absent (Cloud Run default of
        max=100 is irrelevant here — this rule is a trigger for design
        review, fired only when the operator explicitly raises the cap
        in a config file).
    remediation: |
      Cloud Run --max-instances > 1 triggers v1 follow-ups: see memory
      files design_decision_secret_store_cache_2026_05_14 + initiate
      cross-instance work. Specifically, before scaling out:
        1. SecretStore: implement Pub/Sub cache invalidation OR rotate
           via revision-roll (each new revision has cold cache).
        2. Rate limiters: move counters to Redis/Memorystore OR accept
           per-instance multiplication.
        3. Scheduler jobs: implement distributed leader-election OR
           keep schedulers as Cloud Run Jobs (always single-shot).
      File a v1 follow-up issue referencing this rule fire before merge.

# ============================================================================
# INFO — APPROVED EXCEPTIONS / DOCUMENTED OVERRIDES
# ============================================================================

  - id: INFO-001
    name: documented_override
    principle_ref: §11
    severity: info
    scope: [codebase, markdown, decision]
    detection:
      type: regex
      patterns:
        - 'GIGATON_OVERRIDE: [A-Z-]+ approved by'
        - 'doctrine_exception_id'
    description: |
      A known violation that has been formally overridden by governance.
      Must reference exception_id from doctrine_exceptions/ registry.
      The scanner LOGS these — does not flag them as drift.

