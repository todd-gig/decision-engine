# Cloud Build pipeline — builds the Drift Sentinel image and deploys it as
# a Cloud Run Job. Schedule the job from Cloud Scheduler (see scheduler.yaml).
#
# Substitutions:
#   _PROJECT_ID    GCP project (defaults to $PROJECT_ID)
#   _REGION        deploy region (default us-central1)
#   _REPO          Artifact Registry repo (default cloud-run-source-deploy)
#   _JOB_NAME      Cloud Run Job name (default drift-sentinel)
#
# Trigger:
#   gcloud builds submit --config drift_sentinel/deploy/gcp/cloudbuild.yaml .
#
# Run from repo root so the build context includes
# MASTER_FIRST_PRINCIPLES_REFERENCE.md alongside drift_sentinel/.

substitutions:
  _REGION: us-central1
  _JOB_NAME: drift-sentinel
  # Hardcode project (carmen-beach-properties) — Cloud Build does not expand
  # ${PROJECT_ID} inside substitution defaults. Override via --substitutions
  # _IMAGE=... if you ever build into a different project.
  _IMAGE: us-central1-docker.pkg.dev/carmen-beach-properties/cloud-run-source-deploy/drift-sentinel

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - "${_IMAGE}:${BUILD_ID}"
      - -t
      - "${_IMAGE}:latest"
      - -f
      - drift_sentinel/deploy/gcp/Dockerfile
      - .

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    waitFor: [build]
    args: [push, "${_IMAGE}:${BUILD_ID}"]

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    waitFor: [build]
    args: [push, "${_IMAGE}:latest"]

  - id: deploy-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-sha]
    entrypoint: bash
    args:
      - -c
      - |
        set -e

        # Slack secret is intentionally not mounted — Slack integrations
        # are user-level only (see feedback_slack_user_level_only).
        # GH_TOKEN is the only secret this job needs; mount only if present.
        # NB: $$ escapes bash vars from Cloud Build substitution.
        SECRET_FLAG=""
        if gcloud secrets describe drift-gh-token >/dev/null 2>&1; then
          SECRET_FLAG="--set-secrets=GH_TOKEN=drift-gh-token:latest"

          # Resolve the project's default compute SA — this is the runtime
          # SA Cloud Run Jobs use when --service-account isn't specified.
          PROJECT_NUMBER="$$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')"
          RUNTIME_SA="$${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"

          # Self-heal: grant the runtime SA secretmanager.secretAccessor on
          # this specific secret. Idempotent — re-grants are no-ops.
          # Without this, the deploy fails with:
          #   "Permission denied on secret: ... for Revision service account
          #    ...-compute@developer.gserviceaccount.com"
          gcloud secrets add-iam-policy-binding drift-gh-token \
            --member="serviceAccount:$${RUNTIME_SA}" \
            --role="roles/secretmanager.secretAccessor" \
            --quiet \
            >/dev/null 2>&1 \
            || echo "[deploy] WARN: could not grant secret access to $${RUNTIME_SA} (may already be granted)"
        else
          echo "[deploy] drift-gh-token not set — GitHub adapter will yield 0 artifacts"
        fi

        if gcloud run jobs describe ${_JOB_NAME} --region=${_REGION} >/dev/null 2>&1; then
          gcloud run jobs update ${_JOB_NAME} \
            --image=${_IMAGE}:${BUILD_ID} \
            --region=${_REGION} \
            $$SECRET_FLAG \
            --task-timeout=1800s \
            --max-retries=1
        else
          gcloud run jobs create ${_JOB_NAME} \
            --image=${_IMAGE}:${BUILD_ID} \
            --region=${_REGION} \
            $$SECRET_FLAG \
            --task-timeout=1800s \
            --max-retries=1
        fi

images:
  - "${_IMAGE}:${BUILD_ID}"
  - "${_IMAGE}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
